<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<title>小女孩和花花獅拍貼機</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Noto+Sans+TC:wght@500;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#FDF3EB;
    --surface:#FFFFFF;
    --ink:#3E2A1A;
    --muted:#B89880;
    --accent:#E87830;
    --accent-soft:#FDEADB;
    --accent2:#C8691A;
    --accent2-soft:#FEF0E3;
    --line:#EDD9C8;

    --font-zh:'Noto Sans TC', sans-serif;
    --font-en:'Fredoka', 'Noto Sans TC', sans-serif;
  }

  *{ box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
  html,body{
    width:100%; height:100%;
    background:var(--bg);
    overflow:hidden;
    font-family:var(--font-zh);
    color:var(--ink);
    -webkit-user-select:none; user-select:none;
  }

  #app{
    position:fixed; inset:0;
    height:100vh; height:100dvh;
    display:flex; flex-direction:column;
  }

  /* ── Copyright footer ── */
  #copyright-footer{
    flex-shrink:0;
    text-align:center;
    padding:6px 0 max(8px, env(safe-area-inset-bottom));
    font-family:var(--font-en);
    font-size:11px;
    font-weight:500;
    letter-spacing:.12em;
    color:var(--muted);
    background:var(--bg);
    border-top:1px solid var(--line);
    z-index:100;
  }

  /* ── Screens container ── */
  #screens{
    flex:1; position:relative; overflow:hidden;
  }

  .screen{
    position:absolute; inset:0;
    display:flex; flex-direction:column;
    opacity:0; visibility:hidden;
    transition:opacity .45s ease;
    pointer-events:none;
    background:var(--bg);
  }
  .screen.active{ opacity:1; visibility:visible; pointer-events:auto; }

  /* ===================== 共用：54x85 比例框 ===================== */
  .ratio-box{
    aspect-ratio:54/85;
    border-radius:20px;
    overflow:hidden;
    position:relative;
    background:var(--surface);
  }

  /* ===================== 1. 歡迎頁 ===================== */
  #screen-welcome{
    align-items:center; justify-content:space-between;
    text-align:center;
    padding:52px 28px 44px;
    background:
      radial-gradient(circle at 18% 12%, var(--accent-soft) 0%, transparent 45%),
      radial-gradient(circle at 85% 78%, var(--accent2-soft) 0%, transparent 45%),
      var(--bg);
    cursor:pointer;
  }
  .welcome-deco-top{ display:flex; gap:14px; }
  .welcome-deco-top svg{ width:30px; height:30px; }

  .welcome-mid{ display:flex; flex-direction:column; align-items:center; gap:28px; }
  .mascot-emoji{
    font-size:88px;
    line-height:1;
    display:flex; align-items:center;
    filter:drop-shadow(0 8px 16px #00000014);
  }
  .mascot-emoji .emoji-gap{ margin-left:6px; }

  .brand-title{
    font-family:var(--font-zh);
    font-weight:900;
    font-size:40px;
    line-height:1.5;
    color:var(--ink);
    letter-spacing:.06em;
  }
  .brand-sub{
    font-family:var(--font-en);
    font-weight:600;
    font-size:26px;
    letter-spacing:.28em;
    color:var(--accent);
    margin-top:14px;
  }

  .press-start{
    font-family:var(--font-en);
    font-weight:600;
    font-size:17px;
    letter-spacing:.22em;
    color:#fff;
    background:var(--accent);
    border:none;
    border-radius:50px;
    padding:18px 40px;
    animation:pulseScale 1.8s ease-in-out infinite;
    box-shadow:0 8px 24px -6px #E8783055;
  }
  @keyframes pulseScale{
    0%,100%{ transform:scale(1); }
    50%{ transform:scale(1.045); }
  }

  /* ===================== 2. 選擇相框 ===================== */
  #screen-frames{ padding:0; }

  .frames-header{
    flex-shrink:0;
    padding:32px 24px 16px;
    text-align:center;
    font-family:var(--font-zh);
    font-weight:900;
    font-size:20px;
    color:var(--ink);
    letter-spacing:.04em;
  }

  /* Grid: full-width columns, proportional rows */
  .frames-scroll{
    flex:1;
    overflow-y:auto;
    -webkit-overflow-scrolling:touch;
    padding:0 16px 16px;
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:14px;
    align-content:start;
  }

  /* Each slot keeps 54:85 ratio via padding trick instead of aspect-ratio
     so it actually fills the column width */
  .frame-slot{
    width:100%;
    padding-bottom:calc(100% * 85/54);
    position:relative;
    border-radius:16px;
    border:2px dashed var(--line);
    background:var(--surface);
    box-shadow:0 4px 14px -6px #00000014;
    transition:border-color .25s, background .25s, transform .15s;
    overflow:hidden;
  }
  .frame-slot:active{ transform:scale(.97); }
  .frame-slot.selected{
    border:2.5px solid var(--accent);
    background:var(--accent-soft);
  }
  .frame-slot.has-image{ border-style:solid; border-color:var(--line); }
  .frame-slot.has-image.selected{ border-color:var(--accent); }

  /* All children inside the padded slot are absolute */
  .frame-slot > *:not(input){
    position:absolute; inset:0;
  }
  .frame-slot img{ width:100%; height:100%; object-fit:cover; display:block; }

  .slot-inner{
    display:flex; align-items:center; justify-content:center;
  }
  .plus-icon{ width:28px; height:28px; color:var(--muted); }

  .sel-badge{
    top:auto; left:auto;
    bottom:8px; right:8px;
    width:26px; height:26px; border-radius:50%;
    background:var(--accent);
    display:flex; align-items:center; justify-content:center;
    opacity:0; transform:scale(.6);
    transition:opacity .2s, transform .2s;
    z-index:2;
    position:absolute;
  }
  .frame-slot.selected .sel-badge{ opacity:1; transform:scale(1); }
  .sel-badge svg{ width:13px; height:13px; }

  .replace-btn{
    position:absolute; top:8px; left:8px;
    width:26px; height:26px; border-radius:50%;
    background:#ffffffcc; backdrop-filter:blur(2px);
    border:1px solid var(--line);
    display:flex; align-items:center; justify-content:center;
    z-index:2;
  }
  .replace-btn svg{ width:13px; height:13px; color:var(--ink); }

  .frames-footer{
    flex-shrink:0;
    display:flex; gap:14px;
    padding:12px 20px 20px;
    background:var(--bg);
    border-top:1px solid var(--line);
  }
  .btn{
    font-family:var(--font-zh);
    font-weight:700;
    font-size:17px;
    border-radius:50px;
    padding:17px 0;
    flex:1;
    border:none;
    transition:transform .15s, opacity .2s;
    cursor:pointer;
  }
  .btn:active{ transform:scale(.97); }
  .btn-outline{
    background:var(--surface);
    color:var(--ink);
    border:2.5px solid var(--ink);
  }
  .btn-fill{
    background:var(--accent);
    color:#fff;
  }
  .btn-fill:disabled{ opacity:.35; }

  /* ===================== 3. 拍照畫面 ===================== */
  #screen-camera{
    align-items:center; justify-content:space-between;
    padding:40px 24px 28px;
  }
  .cam-box{
    width:min(72vw, 320px);
    box-shadow:0 18px 40px -10px #00000022;
    border:3px solid var(--surface);
    outline:1px solid var(--line);
  }
  .cam-box video, .cam-box canvas{
    position:absolute; inset:0;
    width:100%; height:100%; object-fit:cover;
  }
  #video{ transform:scaleX(-1); }
  .frame-overlay-img{
    position:absolute; inset:0;
    width:100%; height:100%; object-fit:cover;
    pointer-events:none;
  }
  #capturedCanvas{ display:none; }
  #capturedCanvas.show{ display:block; }
  #video.hide{ display:none; }

  .flash-overlay{
    position:absolute; inset:0; background:#fff;
    opacity:0; pointer-events:none; border-radius:18px;
    z-index:3;
  }
  .flash-overlay.fire{ animation:flashFire .3s ease-out; }
  @keyframes flashFire{ 0%{opacity:1} 100%{opacity:0} }

  .countdown-num{
    position:absolute; inset:0;
    display:flex; align-items:center; justify-content:center;
    font-family:var(--font-en);
    font-weight:700;
    font-size:120px;
    color:#fff;
    text-shadow:0 4px 20px #00000055;
    background:#00000022;
    z-index:4;
    opacity:0; pointer-events:none;
  }
  .countdown-num.show{
    animation:countPulse .9s ease-out;
  }
  @keyframes countPulse{
    0%{ opacity:0; transform:scale(1.5); }
    20%{ opacity:1; transform:scale(1); }
    85%{ opacity:1; transform:scale(1); }
    100%{ opacity:0; transform:scale(.92); }
  }

  .cam-buttons{
    display:flex; gap:14px;
    width:100%;
    max-width:380px;
  }

  /* ===================== 4. 列印中 ===================== */
  #screen-printing{
    align-items:center; justify-content:center;
    padding:0 28px;
    gap:0;
  }
  .print-box{
    width:min(55vw, 260px);
    box-shadow:0 24px 50px -12px #00000026;
    margin-bottom:32px;
    animation:printPop .6s ease-out;
  }
  @keyframes printPop{
    0%{ opacity:0; transform:translateY(18px) scale(.96); }
    100%{ opacity:1; transform:translateY(0) scale(1); }
  }
  .print-box canvas{
    position:absolute; inset:0;
    width:100%; height:100%; object-fit:cover;
  }

  .printing-text{
    font-family:var(--font-zh);
    font-weight:700;
    font-size:20px;
    color:var(--ink);
    display:flex; flex-direction:column; align-items:center; gap:12px;
  }
  .dot-flicker{ display:flex; gap:6px; }
  .dot-flicker span{
    display:inline-block; width:9px; height:9px; border-radius:50%;
    background:var(--accent);
    animation:dotBlink 1.2s infinite;
  }
  .dot-flicker span:nth-child(2){ animation-delay:.2s; }
  .dot-flicker span:nth-child(3){ animation-delay:.4s; }
  @keyframes dotBlink{ 0%,80%,100%{opacity:.15} 40%{opacity:1} }

  .progress-track{
    width:180px; height:7px; background:var(--line);
    margin-top:20px; border-radius:6px; overflow:hidden;
  }
  .progress-fill{
    height:100%; background:var(--accent); width:0%;
    border-radius:6px;
    transition:width .4s linear;
  }

  /* ── Done stage ── */
  #doneStage{
    display:none;
    flex-direction:column; align-items:center; gap:14px;
  }
  .done-title{
    font-family:var(--font-zh);
    font-weight:900;
    font-size:18px;
    color:var(--ink);
    text-align:center;
    line-height:1.5;
  }
  .qr-wrap{
    background:var(--surface);
    padding:16px;
    border-radius:20px;
    box-shadow:0 14px 30px -10px #00000022;
    border:2px solid var(--line);
  }
  .qr-wrap canvas{ display:block; width:180px !important; height:180px !important; }
  .qr-label{
    font-family:var(--font-zh);
    font-weight:700;
    font-size:13px;
    color:var(--muted);
    text-align:center;
  }
  #btnNextShot{ flex:none; width:220px; margin-top:4px; }

  #captureCanvasFull{ display:none; }
</style>
</head>
<body>

<div id="app">

  <!-- ── 全部畫面的容器 ── -->
  <div id="screens">

    <!-- ===================== 1. 歡迎光臨 ===================== -->
    <div class="screen active" id="screen-welcome">
      <div class="welcome-deco-top">
        <svg viewBox="0 0 40 40" fill="none"><circle cx="20" cy="20" r="6" fill="var(--accent2)"/><g fill="var(--accent)"><ellipse cx="20" cy="7" rx="5" ry="8"/><ellipse cx="20" cy="33" rx="5" ry="8"/><ellipse cx="7" cy="20" rx="8" ry="5"/><ellipse cx="33" cy="20" rx="8" ry="5"/></g></svg>
        <svg viewBox="0 0 40 40" fill="none"><circle cx="20" cy="20" r="6" fill="var(--accent)"/><g fill="var(--accent2)"><ellipse cx="20" cy="7" rx="5" ry="8"/><ellipse cx="20" cy="33" rx="5" ry="8"/><ellipse cx="7" cy="20" rx="8" ry="5"/><ellipse cx="33" cy="20" rx="8" ry="5"/></g></svg>
        <svg viewBox="0 0 40 40" fill="none"><circle cx="20" cy="20" r="6" fill="var(--accent2)"/><g fill="var(--accent)"><ellipse cx="20" cy="7" rx="5" ry="8"/><ellipse cx="20" cy="33" rx="5" ry="8"/><ellipse cx="7" cy="20" rx="8" ry="5"/><ellipse cx="33" cy="20" rx="8" ry="5"/></g></svg>
      </div>

      <div class="welcome-mid">
        <div class="mascot-emoji">👧<span class="emoji-gap">🦁</span></div>
        <div>
          <div class="brand-title">小女孩和花花獅<br>拍貼機</div>
          <div class="brand-sub">PHOTO BOOTH</div>
        </div>
      </div>

      <div class="press-start">PRESS TO START</div>
    </div>

    <!-- ===================== 2. 選擇相框 ===================== -->
    <div class="screen" id="screen-frames">
      <div class="frames-header">選擇你的相框</div>
      <div class="frames-scroll" id="framesScroll"></div>
      <div class="frames-footer">
        <button class="btn btn-outline" id="btnFrameBack">返回</button>
        <button class="btn btn-fill" id="btnFrameConfirm" disabled>確認</button>
      </div>
    </div>

    <!-- ===================== 3. 拍照畫面 ===================== -->
    <div class="screen" id="screen-camera">
      <div></div>
      <div class="ratio-box cam-box" id="camBox">
        <video id="video" autoplay playsinline muted></video>
        <canvas id="capturedCanvas"></canvas>
        <img class="frame-overlay-img" id="cameraFrameOverlay" src="" style="display:none">
        <div class="countdown-num" id="countdownNum"></div>
        <div class="flash-overlay" id="flashOverlay"></div>
      </div>
      <div class="cam-buttons">
        <button class="btn btn-outline" id="btnRetake" disabled>重新拍照</button>
        <button class="btn btn-fill" id="btnConfirmShot">確認拍照</button>
      </div>
    </div>

    <!-- ===================== 4. 列印中 / 完成 ===================== -->
    <div class="screen" id="screen-printing">
      <div class="ratio-box print-box" id="printBox">
        <canvas id="resultCanvas"></canvas>
      </div>

      <div id="printingStage">
        <div class="printing-text">
          <div>照片列印中　請稍候</div>
          <div class="dot-flicker"><span></span><span></span><span></span></div>
        </div>
        <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
      </div>

      <div id="doneStage">
        <div class="done-title">照片已準備好～<br>掃描儲存照片！</div>
        <div class="qr-wrap" id="qrWrap"><canvas id="qrCanvas"></canvas></div>
        <div class="qr-label" id="qrLabel"></div>
        <button class="btn btn-fill" id="btnNextShot">拍下一張</button>
      </div>
    </div>

  </div><!-- /#screens -->

  <!-- ── 固定在底部的 Copyright ── -->
  <div id="copyright-footer">© PLUDDIE STUDIO</div>

  <canvas id="captureCanvasFull"></canvas>
</div>

<script>
/* =========================================================
   設定區：相框資料
========================================================= */
const FRAME_DATA = [
  { id:1, src:null },
  { id:2, src:null },
  { id:3, src:null },
  { id:4, src:null },
  { id:5, src:null },
  { id:6, src:null },
  { id:7, src:null },
  { id:8, src:null },
];

/* =========================================================
   設定區：傳送設定（EmailJS）
========================================================= */
const EMAILJS_CONFIG = {
  enabled: false,
  publicKey: 'YOUR_PUBLIC_KEY',
  serviceId: 'YOUR_SERVICE_ID',
  templateId: 'YOUR_TEMPLATE_ID',
  toEmail: 'your-phone-mailbox@example.com'
};

/* =========================================================
   設定區：QR Code 下載連結（imgbb 圖片上傳）
========================================================= */
const IMGBB_CONFIG = {
  enabled: false,
  apiKey: 'YOUR_IMGBB_API_KEY',
};

const OUT_W = 1080, OUT_H = 1700;

/* ========================================================= */

let state = {
  selectedFrame: null,
  stream: null,
  capturedDataUrl: null,
  shotState: 'live',
  counting: false,
};

const screens = {
  welcome: document.getElementById('screen-welcome'),
  frames:  document.getElementById('screen-frames'),
  camera:  document.getElementById('screen-camera'),
  printing:document.getElementById('screen-printing'),
};

function goTo(name){
  Object.values(screens).forEach(s=>s.classList.remove('active'));
  screens[name].classList.add('active');
}

/* ---------- 1. 歡迎頁 ---------- */
// 頁面一載入就靜默請求相機權限（讓瀏覽器彈窗在首頁就出現）
window.addEventListener('load', ()=>{
  navigator.mediaDevices.getUserMedia({ video:true, audio:false })
    .then(s=>{ s.getTracks().forEach(t=>t.stop()); })
    .catch(()=>{});
});

screens.welcome.addEventListener('click', ()=>{
  renderFrameList();
  goTo('frames');
});

/* ---------- 2. 相框選擇 ---------- */
function renderFrameList(){
  const wrap = document.getElementById('framesScroll');
  wrap.innerHTML = '';
  FRAME_DATA.forEach(frame=>{
    // outer wrapper (provides padding-bottom aspect ratio)
    const slot = document.createElement('div');
    slot.className = 'frame-slot' + (frame.src ? ' has-image' : '');
    slot.dataset.id = frame.id;

    const fileInput = document.createElement('input');
    fileInput.type = 'file';
    fileInput.accept = 'image/*';
    fileInput.style.display = 'none';
    fileInput.addEventListener('change', (e)=>{
      const file = e.target.files[0];
      if(!file) return;
      const reader = new FileReader();
      reader.onload = (ev)=>{
        frame.src = ev.target.result;
        document.querySelectorAll('.frame-slot').forEach(c=>c.classList.remove('selected'));
        state.selectedFrame = frame;
        document.getElementById('btnFrameConfirm').disabled = false;
        renderFrameList();
        const refreshed = wrap.querySelector(`.frame-slot[data-id="${frame.id}"]`);
        if(refreshed) refreshed.classList.add('selected');
      };
      reader.readAsDataURL(file);
    });
    slot.appendChild(fileInput);

    // inner content div (absolute fill)
    const inner = document.createElement('div');
    inner.className = 'slot-inner';
    if(frame.src){
      const img = document.createElement('img');
      img.src = frame.src;
      img.alt = '';
      inner.appendChild(img);
    } else {
      inner.innerHTML = `<svg class="plus-icon" viewBox="0 0 24 24" fill="none"><path d="M12 5V19M5 12H19" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"/></svg>`;
    }
    slot.appendChild(inner);

    if(frame.src){
      const replaceBtn = document.createElement('div');
      replaceBtn.className = 'replace-btn';
      replaceBtn.innerHTML = `<svg viewBox="0 0 24 24" fill="none"><path d="M4 16.5V19a1 1 0 001 1h2.5L18 9.5 14.5 6 4 16.5zM16 4l4 4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
      replaceBtn.addEventListener('click', (e)=>{ e.stopPropagation(); fileInput.click(); });
      slot.appendChild(replaceBtn);
    }

    slot.insertAdjacentHTML('beforeend', `
      <div class="sel-badge">
        <svg viewBox="0 0 12 10" fill="none"><path d="M1 5L4.5 8.5L11 1" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
    `);

    slot.addEventListener('click', ()=>{
      if(!frame.src){ fileInput.click(); return; }
      document.querySelectorAll('.frame-slot').forEach(c=>c.classList.remove('selected'));
      slot.classList.add('selected');
      state.selectedFrame = frame;
      document.getElementById('btnFrameConfirm').disabled = false;
    });

    if(state.selectedFrame && state.selectedFrame.id === frame.id){
      slot.classList.add('selected');
    }

    wrap.appendChild(slot);
  });
}

document.getElementById('btnFrameBack').addEventListener('click', ()=>{
  state.selectedFrame = null;
  document.getElementById('btnFrameConfirm').disabled = true;
  goTo('welcome');
});

document.getElementById('btnFrameConfirm').addEventListener('click', startCamera);

/* ---------- 3. 拍照畫面 ---------- */
async function startCamera(){
  const overlay = document.getElementById('cameraFrameOverlay');
  if(state.selectedFrame.src){
    overlay.src = state.selectedFrame.src;
    overlay.style.display = 'block';
  } else {
    overlay.style.display = 'none';
  }

  resetCameraState();
  goTo('camera');

  try{
    state.stream = await navigator.mediaDevices.getUserMedia({
      video:{ facingMode:'user', width:{ideal:1080}, height:{ideal:1440} },
      audio:false
    });
    document.getElementById('video').srcObject = state.stream;
  }catch(err){
    alert('無法開啟鏡頭，請確認已允許相機權限。\n' + err.message);
    goTo('frames');
  }
}

function resetCameraState(){
  state.shotState = 'live';
  state.capturedDataUrl = null;
  state.counting = false;
  document.getElementById('video').classList.remove('hide');
  document.getElementById('capturedCanvas').classList.remove('show');
  document.getElementById('btnRetake').disabled = true;
  document.getElementById('btnConfirmShot').disabled = false;
}

document.getElementById('btnConfirmShot').addEventListener('click', ()=>{
  if(state.shotState === 'live'){
    if(state.counting) return;
    startCountdownThenShoot();
  } else {
    finishCamera();
  }
});

document.getElementById('btnRetake').addEventListener('click', ()=>{
  if(state.shotState !== 'captured' || state.counting) return;
  state.shotState = 'live';
  state.capturedDataUrl = null;
  document.getElementById('video').classList.remove('hide');
  document.getElementById('capturedCanvas').classList.remove('show');
  document.getElementById('btnRetake').disabled = true;
});

function setCamButtonsDisabled(disabled){
  document.getElementById('btnConfirmShot').disabled = disabled;
  document.getElementById('btnRetake').disabled = disabled || state.shotState !== 'captured';
}

function startCountdownThenShoot(){
  state.counting = true;
  setCamButtonsDisabled(true);
  const numEl = document.getElementById('countdownNum');
  let n = 3;
  showCountdownNumber(numEl, n);
  const interval = setInterval(()=>{
    n--;
    if(n > 0){
      showCountdownNumber(numEl, n);
    } else {
      clearInterval(interval);
      setTimeout(()=>{
        takeSnapshot();
        state.counting = false;
        setCamButtonsDisabled(false);
      }, 700);
    }
  }, 1000);
}

function showCountdownNumber(numEl, n){
  numEl.textContent = n;
  numEl.classList.remove('show');
  void numEl.offsetWidth;
  numEl.classList.add('show');
}

function takeSnapshot(){
  const video = document.getElementById('video');
  const canvas = document.getElementById('capturedCanvas');
  const flash = document.getElementById('flashOverlay');

  flash.classList.remove('fire');
  void flash.offsetWidth;
  flash.classList.add('fire');

  canvas.width = OUT_W; canvas.height = OUT_H;
  const ctx = canvas.getContext('2d');
  drawVideoCover(ctx, video, OUT_W, OUT_H, true);

  state.capturedDataUrl = canvas.toDataURL('image/jpeg', 0.92);
  state.shotState = 'captured';
  video.classList.add('hide');
  canvas.classList.add('show');
  document.getElementById('btnRetake').disabled = false;
}

function drawVideoCover(ctx, video, W, H, mirror){
  const vw = video.videoWidth, vh = video.videoHeight;
  const vr = vw/vh, tr = W/H;
  let sx,sy,sw,sh;
  if(vr > tr){ sh = vh; sw = sh*tr; sx=(vw-sw)/2; sy=0; }
  else{ sw = vw; sh = sw/tr; sx=0; sy=(vh-sh)/2; }
  ctx.save();
  if(mirror){ ctx.translate(W,0); ctx.scale(-1,1); }
  ctx.drawImage(video, sx,sy,sw,sh, 0,0,W,H);
  ctx.restore();
}

function finishCamera(){
  if(state.stream) state.stream.getTracks().forEach(t=>t.stop());
  goTo('printing');
  composeAndPrint();
}

/* ---------- 4. 合成 + 列印中 + 自動傳送 + QR 下載 ---------- */
async function composeAndPrint(){
  document.getElementById('printingStage').style.display = '';
  document.getElementById('doneStage').style.display = 'none';
  document.getElementById('progressFill').style.width = '0%';

  const canvas = document.getElementById('resultCanvas');
  const ctx = canvas.getContext('2d');
  canvas.width = OUT_W; canvas.height = OUT_H;

  await new Promise(resolve=>{
    const img = new Image();
    img.onload = ()=>{ ctx.drawImage(img, 0,0,OUT_W,OUT_H); resolve(); };
    img.src = state.capturedDataUrl;
  });

  if(state.selectedFrame && state.selectedFrame.src){
    await new Promise(resolve=>{
      const frameImg = new Image();
      frameImg.onload = ()=>{ ctx.drawImage(frameImg, 0,0,OUT_W,OUT_H); resolve(); };
      frameImg.onerror = resolve;
      frameImg.src = state.selectedFrame.src;
    });
  }

  const finalDataUrl = canvas.toDataURL('image/jpeg', 0.92);

  // 背景寄出 email，同時讓 loading bar 跑 30 秒
  sendEmailInBackground(finalDataUrl);
  await animateProgress(30000);

  await showDownloadStage(finalDataUrl);
}

function animateProgress(duration){
  return new Promise(resolve=>{
    const fill = document.getElementById('progressFill');
    const start = performance.now();
    function tick(now){
      const p = Math.min(1, (now-start)/duration);
      fill.style.width = (p*100) + '%';
      if(p < 1) requestAnimationFrame(tick);
      else resolve();
    }
    requestAnimationFrame(tick);
  });
}

async function sendEmailInBackground(finalDataUrl){
  try{
    if(EMAILJS_CONFIG.enabled && window.emailjs){
      await emailjs.send(EMAILJS_CONFIG.serviceId, EMAILJS_CONFIG.templateId, {
        to_email: EMAILJS_CONFIG.toEmail,
        image_data: finalDataUrl,
        time: new Date().toLocaleString()
      }, EMAILJS_CONFIG.publicKey);
    }
  }catch(err){
    console.error('Email 傳送失敗', err);
  }
}

async function uploadToImgbb(dataUrl){
  const base64 = dataUrl.split(',')[1];
  const form = new FormData();
  form.append('image', base64);
  const resp = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_CONFIG.apiKey}`, {
    method:'POST', body: form
  });
  const json = await resp.json();
  if(json && json.success) return json.data.url || json.data.display_url;
  throw new Error('imgbb upload failed');
}

async function showDownloadStage(finalDataUrl){
  document.getElementById('printingStage').style.display = 'none';
  const doneStage = document.getElementById('doneStage');
  doneStage.style.display = 'flex';

  const qrWrap  = document.getElementById('qrWrap');
  const qrLabel = document.getElementById('qrLabel');
  const qrCanvas = document.getElementById('qrCanvas');

  if(IMGBB_CONFIG.enabled && window.QRCode){
    qrLabel.textContent = '正在產生下載連結…';
    try{
      const url = await uploadToImgbb(finalDataUrl);
      // clear previous render
      qrCanvas.width = qrCanvas.height = 0;
      QRCode.toCanvas(qrCanvas, url, {
        width:180, margin:1,
        color:{ dark:'#3E2A1A', light:'#FFFFFF' }
      });
      qrWrap.style.display = '';
      qrLabel.textContent = '用手機掃描下載你的照片';
    }catch(err){
      console.error('上傳失敗', err);
      qrWrap.style.display = 'none';
      qrLabel.textContent = '無法產生 QR Code，請改用 Email 接收';
    }
  } else {
    // imgbb 未啟用：用 data URL 直接產生 QR（讓畫面有 QR 可看）
    if(window.QRCode){
      try{
        // 因 data URL 太長，改用提示文字 QR
        const placeholder = 'https://pluddie.studio';
        qrCanvas.width = qrCanvas.height = 0;
        QRCode.toCanvas(qrCanvas, placeholder, {
          width:180, margin:1,
          color:{ dark:'#3E2A1A', light:'#FFFFFF' }
        });
        qrWrap.style.display = '';
        qrLabel.textContent = '設定 imgbb 後即可掃碼下載照片';
      }catch(e){ qrWrap.style.display = 'none'; }
    } else {
      qrWrap.style.display = 'none';
    }
  }
}

document.getElementById('btnNextShot').addEventListener('click', ()=>{
  state.selectedFrame = null;
  document.getElementById('btnFrameConfirm').disabled = true;
  goTo('welcome');
});
</script>
